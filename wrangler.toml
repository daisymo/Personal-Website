name = "personal-website-chat"
main = "workers/chat.ts"
compatibility_date = "2024-11-01"

[vars]
CHAT_RATE_LIMIT_PER_MINUTE = "10"
CHAT_RATE_LIMIT_PER_DAY = "100"
